[app]
theme = "catppuccin"
vim_mode = false
show_help = true
show_id = true
animations = true
rainbow = false
ai_model = "gemini-3.1-flash-lite-preview"
mcp_enabled = false
mcp_port = "8080"
active_project = "" # Set a default project here (e.g., "Work")

[projects]
default = "default"
shortcut = "ctrl+e"
show_column = "auto"

[list.order]
right = ["project", "tags", "due", "priority"]

[list.fields.due]
minimal = true

[storage]
path = "kairo.db"

[sync]
enabled = false
repo_path = "tasks-sync"
remote = "origin"
branch = "main"
strategy = "ours"
auto_push = true

[plugins]
enabled = true
dir = "plugins"

[keymap]
palette = "ctrl+p"
task_search = "/"
new_task = "n"
edit_task = "e"
delete_task = "d"
open_task = "enter"
back = "esc"
quit = "q"
view_inbox = "1"
view_today = "2"
view_upcoming = "3"
view_completed = "4"
view_tag = "f"
view_priority = "5"
cycle_theme = "t"
open_plugin_dir = "ctrl+g"
manage_plugins = "p"
toggle_strike = "z"
toggle_collapse = "space"
help = "?"
issues = "i"
discussions = "u"
changelog = "c"
settings = "ctrl+s"
import_export = "x"
ai_panel_toggle = "ctrl+a"
stats = "s"
project_switcher = "ctrl+e"
